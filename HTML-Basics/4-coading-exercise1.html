<!-- Instructions:

Create Document Structure:

- Construct a simple HTML document that includes a title, subtitles, and content paragraphs using only basic HTML tags.

- Implement Heading Tags:

1) Use a <h1> tag for the main title of the document.

2) Use <h2> tags for major section titles.

3) Use <h3> tags for any sub-sections within the major sections.

- Ensure that headings are used in a hierarchical order.

- Add Paragraph Tags:

- For each heading, add at least one paragraph tag with dummy text to elaborate on the section.

- Content Structure:

1) The main title (<h1>) should have one paragraph.

2) Each major section (<h2>) should have two paragraphs.

3) Any sub-section (<h3>) should have one paragraph. -->

<!DOCTYPE html>
<html>
    <body>
        <h1>Heading</h1>
        <p>This is paragraph 1.</p>
        <h2>Sub Heading</h2>
        <p>This is sub heading paragraph1</p>
        <p>This is sub heading paragraph2</p>
        <h3>Sub-sub Heading</h3>
        <p>This is sub-sub heading paragraph</p>
        
    </body>
</html>
