<!DOCTYPE html>               <!-- every HTML file should start with <!DOCTYPE html>. This tells browser that the file is HTML -->
<html>                        <!-- <html></html> should be present for any HTML file and everything else will be nested in this tag -->
  <body>                      <!-- <body></body> tag should come next. All the contents which is to be displayed on the web page will be nested in this tag -->
    <h1>This is my first heading</h1>         <!-- for eg <h1>....</h1> are opening tag and closing tag and all the contents between them including opening and closing tags is called element -->
    <p>This is my first paragraph</p>         <!-- Opening tag and closing tag are must for any element in HTML -->
    <p>This is my second paragraph</p>

    <p> This is a paragraph <br />            <!-- <br /> is a breakline line tag and there is no need to close a breakline tag --> 
        with a breakline
    </p>
  </body>
</html>
