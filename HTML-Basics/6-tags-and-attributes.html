<!-- attributes are always in double quotations -->
<!-- If we have to use double quotations inside the attribute content then we can use single quotation for attribute -->
<!-- here Title and Style are 2 attributes used -->
 
<!DOCTYPE html>
<html>
  <body>
    <p> This is a paragraph.</p>
    <p title="I'm a toolip"> This is a paragraph.</p>
    <p title='Using "double" quotes'> This is a paragraph.</p>
    <p style="color: red;"> This is a paragraph.</p>
  </body>
</html>
