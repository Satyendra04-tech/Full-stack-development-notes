<!-- img tag is self closing tag -->

<!DOCTYPE html>
<html>
  <body>
     <!-- Images with absolute URLs -->
    <img src="https://fastly.picsum.photos/id/237/200/300.jpg?hmac=TmmQSbShHz9CdQm0NkEjx1Dyh_Y984R9LpNrpvH2D_U"/> <br />


    <!-- Images with relative URLs -->
    <img src="/HTML Basics/images/landcsape.jpg" alt="a landscape"/> <br />      <!-- The required alt attribute provides an alternate text for an image, if the user for some reason cannot view it (because of slow connection, an error in the src attribute, or if the user uses a screen reader).-->


    <!-- Width and height attibutes -->
    <!-- Better to use only one to maintain the aspect ratio of the image -->
    <!-- The browser scales the second measurement for you in correct aspect ratio -->
    <img width="200" src="/HTML Basics/images/landcsape.jpg" alt="a landscape"/> <br />
    <img height="200" src="/HTML Basics/images/landcsape.jpg" alt="a landscape"/> <br />
    <img height="400" width="400" src="/HTML Basics/images/landcsape.jpg" alt="a landscape"/> <br />    <!--The image is in defaault ratio of 200x300 so size should be in same ratio 400X600, 100x150 will also work-->

  </body>
</html>
