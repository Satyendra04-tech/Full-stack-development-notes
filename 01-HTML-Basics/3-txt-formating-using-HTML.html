<!DOCTYPE html>
<html>
  <body>
    <p>This text is <b>bold</b> text.</p>                                 <!-- <b>...</b> is used to bold the text-->
    <p>This text is <i>italics</i> text.</p>                              <!-- <i>...</i> is used to italics the text-->
    <p>This text is <em>emphasized</em> text.</p>                         <!-- <em>...</em> is used to emphasize the text-->
    <p>My favourite color is <del>Blue</del> Red.</p>                     <!-- <del>...</del> is used to make the user undertand that earlier this text was present-->
    <p>My favourite color is <del>Blue</del> <ins>Red.</ins></p>          <!-- <ins>...</ins> is used to make the user undertand that earlier this text was present is replaced by a new word-->
    <small>This text is small.</small>                                    <!-- <small>....</small> makes the text smaller than rest of the texts-->

  </body>
</html>
