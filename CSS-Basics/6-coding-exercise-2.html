<!-- 
1. Start with the provided HTML structure in the solution.

2. Within the <style> tag, add CSS styles to apply formatting to the elements as specified:
      - Align the text of the <header> to the center.
      - Set the direction of text in the <aside> to right-to-left.
      - Apply an underline text decoration to the <h1> with the color "Crimson".
      - Set the text decoration style of the <h1> to "wavy".
      - Align the text of the <footer> to the right. 
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Text Formatting Exercise</title>
    <style>
        /* Add your CSS styles here */
        header{text-align: center;}
        aside{direction: rtl;}
        h1{text-decoration-line: underline; text-decoration-color: Crimson; text-decoration-style:wavy;}
        footer{text-align: right;}
    </style>
</head>
<body>
    <header>Welcome to Our Blog</header>
    <aside>Important Notice: This content is displayed in a special format.</aside>
    <h1>Today's Featured Article</h1>
    <footer>Contact Us: info@example.com</footer>
</body>
</html>
