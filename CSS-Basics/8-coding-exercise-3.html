<!-- 
1. Use the provided HTML structure.

2. Add CSS styles within the <style> tag to apply the following text styling:
        - Apply text transform uppercase to the <header>.
        - Set text transform capitalize and text indent of 20px for the <p> element.
        - Adjust letter spacing 2px and line height 1.6 for the <h1>.
        - Modify word spacing 8px in the <footer>. 
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Text Styling Exercise</title>
    <style>
        /* Add your CSS styles here */
        header {text-transform: uppercase;}
        p {text-transform: capitalize; text-indent: 20px;}
        h1 {letter-spacing: 2px; line-height: 1.6;}
        footer {word-spacing: 8px;}
    </style>
</head>
<body>
    <header>Our Company</header>
    <h1>Welcome to our website</h1>
    <p>This paragraph provides a brief overview of the content covered on our site.</p>
    <footer>Find out more about our services and offerings.</footer>
</body>
</html>
