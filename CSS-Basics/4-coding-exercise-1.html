<!-- 
1. Start with the provided HTML structure in the solution.

2. Add CSS styles within the <style> tag to apply colors to the elements as specified:
      - Set the text color of the <header> to "DarkSlateGray".
      - Set the background color of the <section> to "HoneyDew".
      - Change the text color of the <footer> to "Tomato".
      - Set the background color of the list items (<li>) inside the unordered list (<ul>) to "Lavender". 
-->
<!DOCTYPE html>
<html>
<head>
    <title>CSS Color Styling Exercise</title>
    <style>
        /* Add your CSS styles here */
        header {color: DarkSlateGray;}
        section {background-color: HoneyDew;}
        footer {color: Tomato;}
        ul li {background-color: Lavender;}
    </style>
</head>
<body>
    <header>Welcome to Our Website</header>
    <section>
        <h1>Today's News</h1>
        <p>This section contains the latest news.</p>
    </section>
    <ul>
        <li>Home</li>
        <li>About</li>
        <li>Contact</li>
    </ul>
    <footer>Copyright © 2023 All rights reserved.</footer>
</body>
</html>
