<!-- The <div> element is used as a container for other HTML elements. -->
<!-- The <div> element in HTML is named "div" because it stands for "division." It is used to create a division or section in a web page, acting as a container for other elements. -->
<!-- The <div> element is a block level element -->

<!DOCTYPE html>
<html>
  <head>
    <title>container element div and span</title>
     <link rel="icon" type="png" href="/HTML Basics/images/favicon.png" />
  </head>
  <body>
    <h1>HTML DIV Example</h1>
    <div>
      <h2>HTML Basics</h2>
      <p>HTML is a markup language</p>
      <p>It uses tags and elements</p>
    </div>

    <!-- Span is a inline element. -->
    <!-- Span can be used to apply styles to a particular worf inside a whole element because it is an inline element -->
     <p>HTML is a <span style="border: 1px solid black;">markup</span> language</p>

     <hr />
  <!-- Difference between span and div -->
   <p>HTML is a <span style="border: 1px solid black;">markup</span> language</p>
   <p>HTML is a <div style="border: 1px solid black;">markup</div> language</p>
  </body>
</html>
