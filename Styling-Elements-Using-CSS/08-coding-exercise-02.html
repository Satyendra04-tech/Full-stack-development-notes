<!-- 
Style each list according to the descriptions:
        - For the list with class disc-list, set the list item marker to a disc.
        - For the list with class circle-list, set the list item marker to a circle.
        - For the list with class inside-list, set the list style position to inside.
        - For the list with class square-list, use the shorthand property to set the list style to square markers positioned outside. 
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <title>List Styling Exercise</title>
    <style>
        /* Add your CSS styles here */
        .disc-list {list-style-type: disc;}
        .circle-list {list-style-type: circle;}
        .inside-list {list-style-position: inside;}
        .square-list {list-style: square outside;}
    </style>
</head>
<body>
    <ul class="disc-list">
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
    </ul>
    <ul class="circle-list">
        <li>Item A</li>
        <li>Item B</li>
        <li>Item C</li>
    </ul>
    <ol class="inside-list">
        <li>Step One</li>
        <li>Step Two</li>
        <li>Step Three</li>
    </ol>
    <ul class="square-list">
        <li>Option X</li>
        <li>Option Y</li>
        <li>Option Z</li>
    </ul>
</body>
</html>
