<!-- 
Apply styles to elements according to the following detailed descriptions:
        - Set the font style of the <h3> to italic.
        - Make the text in the <h1> bold.
        - Apply the shorthand font property to the list items, making the text italic, using small-caps, setting the weight to bold, the size to 1.5 rem, and the font family to Arial with a fallback of sans-serif.
-->

<!DOCTYPE html>
<html>
<head>
    <title>CSS Font Properties Exercise</title>
    <style>
        /* Styles will be added here */
        h3 {font-style: italic;}
        h1 {font-weight: bold;}
        ul li {font: italic small-caps bold 1.5rem "Arial",sans-serif;}
        
    </style>
</head>
<body>
    <h1>Important Heading</h1>
    <h2>First heading with special font style.</h2>
    <h3>Second heading with another font style.</h3>
    <ul>
        <li>List item one</li>
        <li>List item two</li>
        <li>List item three</li>
    </ul>
</body>
</html>
