<!-- We will need only one stylesheet to link to many different html pages. This will ease up the applying selectors -->

<!DOCTYPE html>
<html>
  <head>
    <title>External Stylesheets</title>
    
    <link rel="stylesheet" href="./style.css" />            <!-- This is how we can link a stylesheet to our html-->
  </head>
  <body>
    <p>This paragraph uses font size of 20px</p>
    <p>This also gets the same size</p>

    <div>This will have a background of skyblue</div>
    <div>This will also have a background of skyblue</div>

    <h1>This is a heading</h1>
  </body>
</html>
