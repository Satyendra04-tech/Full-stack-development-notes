<!DOCTYPE html>
<html>
  <head>
    <title>Color Background and Border</title>
  </head>
  <body>
    <h2 style="background-color: aqua; color: brown;">Heading with color names</h2>
    <p style="border: solid 2px green;">Green border</p>

    <h2 style="background-color: rgba(119, 191, 191, 0.5);">Heading with RGBA</h2>
    <p style="border: dotted 2px rgba(191, 119, 187, 0.7);">Pink border</p>

    <h2 style="background-color: hsla(242, 36%, 61%, 0.5);">Heading with HSLA</h2>
    <p style="border: dashed 2px hsla(242, 42%, 42%, .9);">Blue border</p>

    <h2 style="background-color: #98503e;">Heading with HEX code</h2>
    <p style="border: groove 10px #8f2d14 ;">Red border</p>
  </body>
</html>
