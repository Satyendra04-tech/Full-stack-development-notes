<!DOCTYPE html>
<html lang="en">
  <head>
    <title>CSS Font Families Lecture</title>
    <style>
      /* Example 1: Specific Font */
      .specific-font{font-family: "Times New Roman";}                           /*This would apply "Times new roman" font to this class element */


      /* Example 2: Specific Font with Fallback */
      .font-with-fallback{font-family:"Times New Roman", Georgia;}          /* This would apply 1st "Times new roman" and if it is not available in the user browser then it will assign "Georgia" */


      /* Example 3: Specific Font with Fallback and Generic Family */
      .font-with-generic{font-family: "Times New Roman", Georgia, serif;}      /* This would apply 1st "Times new roman" and if it is not available in the user browser then it will assign "Georgia" and if Georgia is also not available then it will assign any font of "serif" family which is available in the user's browser */


       /* Example 4: Sans-Serif Font Family */
       .sans-serif{font-family: Arial, Helvetica, sans-serif;}     /* This would apply 1st "Arial" and if it is not available in the user browser then it will assign "Helvetica" and if Helvetica is also not available then it will assign any font of "sans-serif" family which is available in the user's browser */


       /* Example 5: Monospace Font Family */
       .monospace{font-family: "Courier New", monospace;}          /* This would apply 1st "Courier New" and if it is not available in the user browser then it will assign any font of "monospace" family which is available in the user's browser */


      /* Example 6: Cursive Font Family */
      .cursive{font-family: "Brush Script", cursive;}         /* This would apply 1st "Brush Script" and if it is not available in the user browser then it will assign any font of "cursive" family which is available in the user's browser */

      
      /* Example 7: Fantasy Font Family */
      .fantasy{font-family: "Papyrus", fantasy;}           /* This would apply 1st "Papyrus" and if it is not available in the user browser then it will assign any font of "fantasy" family which is available in the user's browser */

    </style>
  </head>
  <body>
    <!-- Example 1: Using a Specific Font -->
    <p class="specific-font">Times New Roman.</p>


    <!-- Example 2: Using a Specific Font with Fallback -->
    <p class="font-with-fallback">Times New Roman or Georgia.</p>


    <!-- Example 3: Using a Specific Font with Fallback and Generic Family -->
    <p class="font-with-generic">Times New Roman, Georgia, or serif.</p>


    <!-- Example 4: Sans-Serif Font Family -->
    <p class="sans-serif">Arial, Helvetica, or sans-serif.</p>


    <!-- Example 5: Monospace Font Family -->
    <p class="monospace">Courier New or monospace.</p>


    <!-- Example 6: Cursive Font Family -->
    <p class="cursive">Brush Script or cursive.</p>


    <!-- Example 7: Fantasy Font Family -->
    <p class="fantasy">Papyrus or fantasy.</p>
  </body>
</html>
