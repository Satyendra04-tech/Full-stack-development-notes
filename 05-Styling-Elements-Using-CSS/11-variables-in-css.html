<!-- 
We just need to mention the variable name in style1.css sheet and that style will get applied to thw wholw page.
We can use the variable name instead of the property anytime we want to use
We need to define the CSS variable at the root level.
Can be applied to pseudo-classes such as 'hover'.
Please refer to 'style1.css' sheet to know how to define CSS vafriables and how to use them. 
-->


<!DOCTYPE html>
<html lang="en">
  <head>
    <title>CSS Variables</title>
    <link rel="stylesheet" href="./style1.css" />
  </head>
  <body>
    <h1>Understanding CSS Variables</h1>
    <div class="content">
      <p>This is a simple paragraph to demonstrate CSS variables.</p>
      <p class="themed-text">Themed text appears here.</p>
    </div>
  </body>
</html>
